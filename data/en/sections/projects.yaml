- name: Linux Process Manager
  role: Creator
  timeline: "Sep 2020 - Oct 2020"
  repo: https://github.com/NZ369/LinuxProcessManager
  #url: ""
  summary: A process manager called PMan (custom linux shell) that supports running and managing background processes running on the operating system.
