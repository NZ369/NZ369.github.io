- name: Motif Finder
  role: Creator
  timeline: "Jan 2020 - Feb 2020"
  repo: https://github.com/NZ369/MotifFinder
  summary: A transcription factor regulates a gene by binding to a specific DNA interval called a regulatory motif, or transcription factor binding site, in the gene’s upstream region, a 600-1000 nucleotide-long region preceding the start of the gene.  This program finds that region when given the genomic sequence.
  tags: ["hobby", "python", "bioinformatics"]

