# Your experiences
experiences:

- company:
    name: Canadian Border Services Agency
    url: "https://www.cbsa-asfc.gc.ca/menu-eng.html"
    location: Abbotsford BC
    overview: The Canada Border Services Agency is a federal law enforcement agency that is responsible for border control, immigration enforcement, and customs services in Canada.
  positions:
  - designation: Administrative Assistant
    start: MAY 2018
    end: AUG 2018
    responsibilities:
    - In charge of scheduling, digital communications and administrative operations for one of the largest Canadian Border Services Agency port-of-entry in western Canada.
    - Assisted management with administrative tasks and procurement documentation, including supervising over the staffing department and the port’s commercial records.
    - Coordinated scheduling of officers’ overtime and leaves for the entire port of entry as well as out-of-port officer delegations.
    - Managed data entry into registers and forms, including local as well as regional CBSA databases.
    - Developed advanced detail oriented management, individual project management and administrative skill sets approved by federal public service professional standards.

- company:
    name: Canadian Department of National Defence
    url: "https://www.forces.gc.ca/"
    location: Victoria Esquimalt BC
    overview: DND supports the Canadian Armed Forces who serve on the sea, on land, and in the air with the Navy, Army, Air Force and Special Forces to defend Canadians’ interests at home and abroad.
  positions:
  - designation: Surveillance Combat Systems Engineering Intern
    start: JAN 2019
    end: APR 2019
    responsibilities:
    - Engineered an electronic warfare software system to generate corrective coefficients for calibrating the electronic support measures suite (ELISRA) used for RADAR detection on Canadian warships.
    - Improved the efficiency of calibration trials for ELISRA by eliminating over 40 hours of manual data processing for engineering technicians to under 5 hours of software data processing.
    - Individually responsible for designing, programming, prototyping and troubleshooting the ELISRA calibration software from concept to product.  
    - Produced software (ELISRA Calibrator) generates visualizations and calibration coefficients that assists the electronic support measures suite’s in detecting vessels through RADAR emissions.
    - Programmed the software backend using MATLAB and frontend using MATLAB AppDesigner.
    - Completed software will be deployed to both the Pacific and Atlantic Canadian naval fleets.
    - Involved in the co-op student hiring process for the naval architecture engineering sector.
    - Published an engineering recommendation and technical report with regards to improving the calibration of the electronic support measures suite as well as a user and maintenance manual for the ELISRA Calibrator software.

